<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
    
<!-- 기본 -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">

<!-- Android PWA -->
<link rel="manifest" href="manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PWA 테스트">
<link rel="apple-touch-icon" href="icon-192.png">  
<title>Coldish Wave</title>
    

<style>
/* =================================================
   PC 전용 body 스타일
================================================= */
/* PC 전용 body */
@media (min-width: 768px) {
  body {
    background: rgba(255,255,255,.9);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden; /* PC Cover Flow 고정 */
  }
}

/* ================================
   AMBIENT BLUR BACKGROUND
   (Apple Music Mini Player Style)
================================ */
#ambient-bg {
  position: fixed;
  inset: -10%;
  z-index: -1;
  filter: none;
  transform: scale(1.2);
}

/* 배경 화면 이미지 변경*/
#ambient-image {
  position: absolute;
  inset: 0;
  z-index: 1;

  background-size: cover;
  background-position: center;
  filter: blur(40px) saturate(140%);
  transform: scale(1.1); /* 기본 : transform: scale(1.1);  */
  opacity: 0.9;
}

/*  모바일 앰비언트 블러 제거  */
@media (max-width: 767px) {
  /* 1️⃣ 모바일 이미지 숨기기 */
  #ambient-image {
    display: none !important; /* 이미지 렌더링 차단 */
  }

  /* 2️⃣ 모바일은 배경 플랫 컬러만 적용 */
  #ambient-color {
    display: block;
    position: fixed;     /* 화면 전체 고정 */
    inset: 0;            /* top:0; right:0; bottom:0; left:0; */
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,1);  
    z-index: -1;         /* 다른 콘텐츠 뒤로 */
  }
}
    
/* ===============================
   COVER FLOW BACKGROUND DIM 전체 배경 어둡게
================================ */
#coverflow-dim {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5); /* 배경 투명도 */
  pointer-events: none;
  z-index: 2; /* ambient 위, 앨범 아래 */
  transition: background .45s ease;
}

    
/* =================================================
   HEADER WRAPPER (트리거 영역)
   👉 상단에 마우스를 올리면 헤더가 내려옴
================================================= */
.header-wrap {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 70px;          /* 마우스 감지 영역 */
  z-index: 20;
}

/* =================================================
   기본 HEADER pc/mo (검색 / 장르 / 정렬)
================================================= */
header {
  position: absolute;
  top: -56px;            /* 기본 상태: 숨김 */
  left: 0;
  right: 0;
  height: 40px; /* 기존 : 46px */
  padding: 10px 12px;
  display: flex;
  gap: 10px;

  background: rgba(40,40,40,0); /* PC 헤더바 색상 */
  backdrop-filter: blur(10px);

  transition: transform 0.45s cubic-bezier(.22,.61,.36,1);
  transform: translateY(0);
}

/* 마우스 올리면 헤더 표시 */
.header-wrap:hover header {
  transform: translateY(56px);
}

input, select {
  flex: 1;
  padding: 8px 10px;
  font-size: 15px;
  background: #111;
  border: none;
  color: #fff;
}

/* =================================================
   PC HEADER only (검색/장르 탭 더 아래로)
================================================= */
 @media (min-width: 768px) {

  /* 헤더 블러 박스 크기 */
  header {
    height: 40px;        /* 블러 박스 높이 */
    padding: 10px 20px;  /* 위아래 여백 */
  }

  /* 내려오는 위치 */
  .header-wrap:hover header {
    transform: translateY(120px);
  }

  /* 마우스 감지 영역 */
  .header-wrap {
    height: 120px;
  }
}   
    

/* =================================================
   STAGE (Cover Flow 무대)
   👉 화면 정중앙 기준
================================================= */
.stage {
  position: absolute;
  inset: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  perspective: 1600px;   /* 원근 (Cover Flow 핵심) */
  overflow: hidden;
}

/* =================================================
   FLOW CONTAINER
================================================= */
.grid {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
}

/* =================================================
   ALBUM CARD (iTunes Cover Flow 핵심)
================================================= */
.album {
  position: absolute;
  left: 50%;
  top: 50%;                     /* ⭐ 화면 세로 중앙 기준 */
  width: 46vw;  /* 기존: width: 46vw; */
  max-width: 640px;  /* 기존: max-width: 520px; */
  aspect-ratio: 1 / 1;

  transform-style: preserve-3d;
  transform-origin: center;

  cursor: pointer;

  transition: transform 0.6s cubic-bezier(.22,.61,.36,1), opacity 0.4s ease;
  will-change: transform, opacity;
}

.album img {
  width: 100%;       /* 부모 너비에 맞추고 */
  max-width: 640px;  /* 기존: max-width: 520px; */
  height: auto;      /* 높이는 자동 비율 유지 */
  object-fit: cover; /* Cover Flow는 cover 유지 */
  will-change: transform, opacity, filter;    
  border-radius: 16px;
  box-shadow: 0 10px 10px rgba(0,0,0,.25); /* 그림자 기본 : box-shadow: 0 40px 80px rgba(0,0,0,.65); */
  pointer-events: none;
}
    


/* =================================================
   MOBILE
   👉 모바일에서는 Cover Flow 비활성 (리스트형)
================================================= */
@media (max-width: 767px) {
#viewToggle {
    display: none !important;
  }    

  /* 1️⃣ 기본 body/html 세팅 */
  html, body {
    width: 100%;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    overflow-x: hidden; /* 가로 스크롤 제거 */
    overflow-y: auto;   /* 세로 스크롤 허용 */
    overscroll-behavior: contain; /* 키보드 스크롤 안정화 */  
  }

  /* 2️⃣ 헤더 래퍼 항상 표시 */
  .header-wrap {
    position: fixed;
    top: 0;  
    left: 0;
    right: 0;
    z-index: 30;
      
    /* 모바일 헤더 상단까지 블러 채우기 */
    background: rgba(40,40,40,0);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
      
    /* 🔥 블러 영역 확장 */
    padding-bottom: 50px;   /* 아래쪽으로 블러 확장 */   
      
    /* 모바일 헤더 고정 */
    transform: none !important;
    will-change: auto;
  
}

  /* 3️⃣ 헤더 스타일 */
  header {
    position: relative;           /* fixed는 .header-wrap에서 처리 */
    top: 0 !important;            /* PC용 top:-56px 무시 */
    transform: none !important;   /* PC용 transform 무시 */
    width: 100%;
    padding: 80px 10px;              /* header 위치 */
    box-sizing: border-box;
    display: flex;
    gap: 8px;
    background: transparent;
    align-items: center;
  }

  /* 4️⃣ input/select 동일 높이로 조정 */
  header input,
  header select {
    flex: 1 1 0;           /* 공간에 맞게 늘어나고 줄어듦 */
    min-width: 0;          /* shrink 가능 */
    box-sizing: border-box;
    padding: 12px 16px;    /* 내부 여백 */
    height: 48px;          /* ⭐ 높이 명시: 모든 탭 동일 */
    font-size: 16px;
  }

  /* 5️⃣ Stage & Grid 수정 */
  .stage {
    position: static;
    width: 100%;
    padding-top: 118px;     /* 기본 70 + .header-wrap의 top: 00px; 높이만큼 띄움 */
    perspective: none;
    height: auto;
    overflow-x: hidden;
  }

  .grid {
    display: flex;
    flex-direction: column;
    gap: 16px;             /* 앨범 간 간격 */
    padding: 16px 8px;
    width: 100%;
    box-sizing: border-box;
  }

  /* 6️⃣ 앨범 카드: transform 제거, 세로 스크롤용 */
  .album {
    position: static;
    width: 100%;
    aspect-ratio: 1 / 1;   /* 정사각형 유지 */
    transform: none !important;
    transition: none !important;  /* 모바일 애니메이션 제거 */  
    will-change: auto !important;   
    opacity: 1 !important;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,.5);
    display: block;
  }

  .album img {
    width: 100%;
    height: 100%;          /* 부모와 일치 */
    object-fit: cover;
    display: block;
    border-radius: inherit;
  }
    
    /* 7 모바일에서 스크롤 시 헤더 슬라이드 숨김 */
    .header-wrap {
    transition: transform 0.3s ease; /* 슬라이드 애니메이션 */
    }

    .header-wrap.hide {
    transform: translateY(-100%); /* 위로 숨김 */
    }
}
    
    /* =================================================
   VIEW TOGGLE BUTTON (PC)
================================================= */
#viewToggle {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 50;

  padding: 14px 18px;
  font-size: 14px;
  border-radius: 999px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  color: #fff;

  border: none;
  cursor: pointer;
}

/* =================================================
   GRID VIEW (PC 전용)
================================================= */
body.grid-view .stage {
  perspective: none;
}

body.grid-view .grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 24px;
  padding: 80px 40px 40px;
  box-sizing: border-box;
}

body.grid-view .album {
  position: static;
  width: 100%;
  max-width: none;

  transform: none !important;
  opacity: 1 !important;
  z-index: auto !important;
}

body.grid-view .album img {
  box-shadow: 0 16px 32px rgba(0,0,0,.5);
}
    
     
/* =================================================
   GRID VIEW META (PC)
================================================= */
body.grid-view .album {
  display: flex;
  flex-direction: column;
}

body.grid-view .album .meta {
  display: block;          
  margin-top: 10px;   /* ⭐ 이 값 늘리면 간격 벌어짐 */    
  text-align: center;
  letter-spacing: 0.02em;
}

body.grid-view .album .artist {
  font-size: 15px;        /* ⬆ 아티스트명 크게 */
  font-weight: 400;
  line-height: 1.3;
  color: rgba(255,255,255,1); /* 폰트 색상 */
}

body.grid-view .album .title {
  font-size: 12px;        /* ⬇ 앨범명 작게 */
  font-weight: 400;
  opacity: 0.8;
  color: rgba(255,255,255,1); /* 폰트 색상 */

  margin-top: 2px;
}
    
/* =================================================
   GRID VIEW META (기본 숨김)
================================================= */
.album .meta {
  display: none;
}
    
/* =================================================
   ALBUM LINK RESET (IMPORTANT)
================================================= */
.album {
  text-decoration: none;   /* 밑줄 제거 */
  color: inherit;          /* 텍스트 색 부모 상속 */
}

.album:visited,
.album:hover,
.album:active,
.album:focus {
  text-decoration: none;   /* 모든 상태에서 밑줄 제거 */
  color: inherit;
}
    
/* =================================================
   GRID VIEW 스크롤 허용 (추가)
================================================= */
body.grid-view {
  overflow-y: auto;
}

/* =================================================
   GRID VIEW 스크롤 FIX (PC 핵심)
================================================= */
body.grid-view .stage {
  position: static;
  height: auto;
  overflow: visible;
}
    
/* ================================
   FULLSCREEN OVERLAY (PC ONLY) : 전체화면
================================ */
#fullscreenOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,100,.8); /* 🔹 화면 어둡게 */
  backdrop-filter: blur(30px);
  z-index: 9999;

  display: flex;
  align-items: center;
  justify-content: center;
}

#fullscreenBtn {
  padding: 18px 40px;
  font-size: 18px;
  font-weight: 600;

  color: rgba(0,0,100,1);
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);

  border: none;
  border-radius: 999px;
  cursor: pointer;
}

/* 모바일에서는 아예 숨김 */
@media (max-width: 767px) {
  #fullscreenOverlay {
    display: none !important;
  }
}

/* ================================
   FAVORITE STAR
================================ */
.fav {
  position: absolute;
  font-size: 22px;
  color: rgba(255,255,255,.4);
  cursor: pointer;
  z-index: 5;
  transition: transform .2s ease, color .2s ease;
}

.fav:hover {
  transform: scale(1.2);
}

.fav.active {
  color: gold;
}

/*플로어뷰 별표 위치*/
body:not(.grid-view) .fav {
  bottom: 30px;
  right: 30px;
}    
/*그리드뷰 별표 위치*/
body.grid-view .fav {
  top: 10px;
  left: 10px;

  bottom: auto;
  right: auto;

  font-size: 18px; /* 그리드에선 살짝 작게 (선택) */
}

/* ===============================
   화면 새로고침 css
================================ */
#ptr {
  position: fixed;
  top: -60px;
  left: 0;
  right: 0;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  pointer-events: none;
  transition: transform .25s ease;
}

.ptr-icon {
  font-size: 20px;
  opacity: .6;
  transform: rotate(0deg);
  transition: transform .25s ease, opacity .25s ease;
}

/* 로딩 상태 */
#ptr.loading .ptr-icon {
  animation: spin 1s linear infinite;
  content: "↻";
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* =================================================
   커버플로우 시 서브 앨범 자동 숨기기
================================================= */
/* 커버플로우 기본 표시 */
.album {
  opacity: 1;
}

/* 서브 앨범 숨김 */
body.sub-hide .album {
  opacity: 0;
}

body.sub-hide .album[data-active="true"] {
  opacity: 1;
}

/* =================================================
    하단 좌측 장르 표시 HUD 
================================================= */    
#genreHUD {
  position: fixed;
  left: 24px;
  bottom: 24px;
  z-index: 30;

  font-size: 18px;
  font-weight: 500;
  letter-spacing: .04em;
  color: rgba(255,255,255,.9);

  background: rgba(0,0,0,.35);
  backdrop-filter: blur(12px);
  padding: 10px 18px;
  border-radius: 999px;

  opacity: 0;
  transform: translateY(10px);
  transition: opacity .4s ease, transform .4s ease;
}

/* Cover Flow에서만 표시 */
body:not(.grid-view) #genreHUD {
  opacity: 1;
  transform: translateY(0);
}

/* 모바일에서는 숨김 */
@media (max-width: 767px) {
  #genreHUD {
    display: none !important;
  }
}


</style>
</head>

<body>

<!-- =================================================
     화면 새로고침 html
================================================= -->	
<div id="ptr">
  <div class="ptr-icon">↓</div>
</div>
	
<div id="ambient-bg">
  <div id="ambient-image"></div>
  <div id="ambient-color"></div>
  <div id="coverflow-dim"></div>    
</div>
    
<!-- 커버플로우 장르 표시 -->    
<div id="genreHUD"></div>
    
<!-- =================================================
     HEADER (검색 / 장르 / 정렬)
================================================= -->
<div class="header-wrap">
  <header>
    <input type="search"
           placeholder="앨범 / 아티스트 검색"
           oninput="setSearchQuery(this.value)">
    <select onchange="setGenreFilter(this.value)">
      <option value="All">All</option>
      <option value="Favorites">Favorites</option>      
      <option value="am2">am2:00</option>
      <option value="am6">am6:00</option>
      <option value="pm2">pm2:00</option> 
      <option value="pm5">pm5:00</option> 
      <option value="pm9">pm9:00</option>     
      <option value="pm11">pm11:00</option>    
    </select>
    <select onchange="setSortMethod(this.value)">
      <option value="artist">아티스트 이름순</option>
      <option value="year">앨범 연도순</option>
    </select>
  </header>
</div>

<!-- =================================================
     COVER FLOW STAGE
================================================= -->
<div class="stage">
  <main id="grid" class="grid"></main>
</div>
    
<!-- 🔽 VIEW TOGGLE BUTTON (PC 전용) -->
<button id="viewToggle">GRID VIEW</button>
    
<!-- ✅ album JS 분리 : 스크립트 맨위 -->
<script src="albums.js"></script>
    
<script>
/* =================================================
   앨범해상도 조정 : 로딩시간 감안 800 ~ 3000px 까지 설정 가능 (모바일은 200 ~ 500px)
================================================= */    
function getOptimizedCover(url) {
  if (window.innerWidth < 768) {
    return url.replace(/\/\d+x\d+bb\.webp/, '/500x500bb.webp'); // 모바일
  }
  return url.replace(/\/\d+x\d+bb\.webp/, '/1200x1200bb.webp'); // PC
}

    
/* =================================================
   STATE
================================================= */
let index = 0;
let locked = false;
let filteredAlbums = [];   // 현재 화면에 보여질 앨범
let searchQuery = '';
let genreFilter = 'All';
let sortMethod = 'artist';
/* 🔽 VIEW MODE STATE */
let viewMode = 'flow'; // flow | grid
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
/* 🔽 커버플로우 시 서브 앨범 자동 숨기기 */
let hideTimer = null;    
/* 🔽 커버플로우 장르 표시 색상 */
const genreColors = {
  am2:  "#c084fc",  // 멜랑콜리 → 퍼플
  am6:  "#9bd3ff",  // 새벽공기 → 옅은 스카이 블루
  pm2:  "#4ade80",  // 활기찬 → 생기 있는 그린
  pm5:  "#ff9f68",  // 노을 → 웜 오렌지
  pm9:  "#ff3b3b",  // 롹 → 강렬한 레드
  pm11: "#7a7a8c",  // 네거티브 → 디프레시드 그레이 퍼플
  Favorites: "#ffd700"
};
    

    
/* =================================================
   IMAGE LAZY LOAD OBSERVER
================================================= */
const observer = new IntersectionObserver((entries, obs) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const img = entry.target;
      img.src = img.dataset.src;
      obs.unobserve(img);
    }
  });
}, 
  { 
   root: null,
   // rootMargin을 조정하면 Lazy Load 범위를 설정할 수 있음! (모바일 50 ~ 100px 정도, 데스크탑 : 200px(200px전에 이미지 읽음)로 설정)     
   rootMargin: window.innerWidth < 768 ? '50px' : '200px', // <- PC, 모바일 공통 적용 시 : rootMargin: '200px'
   threshold: 0.1 }); 
    // rootMargin을 조정하면 Lazy Load 범위를 설정할 수 있음! (데스크탑 : 200px(200px전에 이미지 읽음), 모바일 50 ~ 100px 정도로 설정)   

	
/* =================================================
   RENDER (Virtualized)
================================================= */
function render(list) {
  grid.innerHTML = '';
  index = 0;
  filteredAlbums = [...list];

  // ✅ 모바일만 가상화 (PC는 가상화 제거)
  let start = 0;
  let end = list.length;

  if (window.innerWidth < 768 && list.length > 50) {
    const approx = Math.floor(window.scrollY / 180);
    start = Math.max(0, approx - 12);
    end   = Math.min(start + 30, list.length);
  }

  list.forEach((a, i) => {

    // ✅ 모바일만 가상화 범위 제한 (PC는 가상화 제거)
    if (window.innerWidth < 768) {
      if (i < start || i >= end) return;
    }

    const el = document.createElement('div');
    el.className = 'album';
    el.dataset.index = i;
    el.dataset.cover = getOptimizedCover(a.cover);
    el.dataset.link = getAppleMusicLink(a.appleMusic);

    el.onclick = () => {
      index = i;
      if (window.innerWidth >= 768) update();

      const url = el.dataset.link;
      window.navigator.standalone
        ? location.replace(url)
        : window.open(url, '_blank');
    };

    const albumId = `${a.artist}__${a.title}`;
    const isFav = favorites.includes(albumId);

    el.innerHTML = `
      <div class="fav ${isFav ? 'active' : ''}"
           onclick="event.stopPropagation(); toggleFavorite('${albumId}')">★</div>

      <img data-src="${getOptimizedCover(a.cover)}"
           alt="${a.title}" loading="lazy">

      <div class="meta">
        <div class="artist">${a.artist}</div>
        <div class="title">${a.title}</div>
      </div>
    `;

    grid.appendChild(el);
    observer.observe(el.querySelector('img'));
  });

  /* 모바일: 스크롤 최상단 유지 (기존)
  =============================== */
  if (window.innerWidth < 768) {
    window.scrollTo({ top: 0, behavior: 'auto' });
  }

  /* PC: Cover Flow update (기존)
  =============================== */
  if (window.innerWidth >= 768) {
    setTimeout(update, 50);
  }
}


    

/* =================================================
   COVER FLOW CORE (수정)
================================================= */
function update() {
  if (viewMode === 'grid') return;

  const cards = document.querySelectorAll('.album');

  cards.forEach((el, i) => {
    const d = i - index;
    const w = el.offsetWidth;

    el.dataset.active = "false";

    if (Math.abs(d) > 3) {
      el.style.transform =
        `translateX(${-w/2 + d*260}px) translateY(-50%) scale(0.8)`;
      el.style.zIndex = 0;
      return;
    }

    if (d === 0) {
      el.dataset.active = "true"; // ⭐ 중앙 앨범 표시
      el.style.transform =
        `translateX(${-w/2}px) translateY(-50%) translateZ(240px) scale(1.15)`;
      el.style.zIndex = 10;
    } else {
      const rotY = d > 0 ? -32 : 32;
      el.style.transform =
        `translateX(${-w/2 + d*260}px) translateY(-50%) rotateY(${rotY}deg) translateZ(-180px) scale(1)`;
      el.style.zIndex = 1;
    }
  });

  /* ⏱ 커버플로우 시 서브 앨범 자동 숨기기 */
  if (window.innerWidth >= 768 && viewMode === 'flow') {
    document.body.classList.remove('sub-hide');
    clearTimeout(hideTimer);

    hideTimer = setTimeout(() => {
      document.body.classList.add('sub-hide');
    }, 4000); // ⬅️ 원하는 시간 (ms)
  }


/* BACKGROUND DIM CONTROL 배경 어둡게 조절 */
const cover = cards[index]?.dataset.cover;
  const ambientImage = document.getElementById('ambient-image');
  if (ambientImage.style.backgroundImage !== `url("${cover}")`) {
    ambientImage.style.backgroundImage = `url("${cover}")`;
  }

/* 커버플로우 앨범 장르 표시 */
const hud = document.getElementById('genreHUD');
const current = filteredAlbums[index];

if (current && viewMode === 'flow' && window.innerWidth >= 768) {
  const genre = current.genre || '';
  hud.textContent = genre;

  // 🎨 장르별 색상 적용
  hud.style.color = genreColors[genre] || "rgba(255,255,255,.9)";
  hud.style.background =
  "linear-gradient(120deg, " + genreColors[genre] + "22, rgba(0,0,0,.4))";

} else {
  hud.textContent = '';
  }
}

/* =================================================
   SCROLL
================================================= */
let animating = false;

window.addEventListener('wheel', e => {
  if (window.innerWidth < 768) return;
  if (animating) return;

  index += e.deltaY > 0 ? 1 : -1;
  index = Math.max(0, Math.min(index, filteredAlbums.length - 1));

  animating = true;
  requestAnimationFrame(() => {
    update();
    animating = false;
  });
}, { passive: true });


/* =================================================
   FILTER / SEARCH / SORT 통합
================================================= */
function applyFilters() {
  let list = albums;

  // 검색
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(a => a.title.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q));
  }

// 장르 / Favorites
if (genreFilter === 'Favorites') {
  list = list.filter(a =>
    favorites.includes(`${a.artist}__${a.title}`)
  );
} else if (genreFilter !== 'All') {
  list = list.filter(a => a.genre === genreFilter);
}
   

  // 정렬
  if (sortMethod === 'artist') {
    list.sort((a,b) => {
      const nameCompare = a.artist.localeCompare(b.artist);
      if (nameCompare !== 0) return nameCompare;
      return (a.year||0) - (b.year||0); // 이름 같으면 연도순
    });
  } else if (sortMethod === 'year') {
    list.sort((a,b) => (a.year||0) - (b.year||0));
  }

// 🔹 정렬이 artist / year 가 아닐 때만 랜덤 섞기
if (sortMethod !== 'artist' && sortMethod !== 'year') {
  list = shuffleArray(list);
}

  render(list);
}


// 상태 setter
function setSearchQuery(q){ searchQuery = q; applyFilters(); }
function setGenreFilter(g){ genreFilter = g; sortMethod = 'random'; applyFilters(); }
function setSortMethod(m){ sortMethod = m; applyFilters(); }

/* =================================================
   APPLE MUSIC LINK
================================================= */
function getAppleMusicLink(url) {
  const ua = navigator.userAgent;
  if (/iPhone|iPad|iPod/i.test(ua)) return url.replace(/^https:/, 'https:');
  if (/Macintosh/i.test(ua)) return url.replace(/^https:/, 'itmss:');
  return url;
}

/* =================================================
   INIT
================================================= */
// 기존: render(albums);
render(shuffleArray(albums));
    
/* =================================================
   VIEW TOGGLE
================================================= */
document.getElementById('viewToggle').addEventListener('click', () => {

  if (window.innerWidth < 768) return; // PC only

  if (viewMode === 'flow') {
    viewMode = 'grid';
    document.body.classList.add('grid-view');
    document.getElementById('viewToggle').textContent = 'FLOW VIEW';
  } else {
    viewMode = 'flow';
    document.body.classList.remove('grid-view');
    document.getElementById('viewToggle').textContent = 'GRID VIEW';
    update(); // 다시 Cover Flow 정렬
  }

});
    

/* =================================================
   KEYBOARD NAVIGATION
================================================= */
window.addEventListener('keydown', e => {
  if (window.innerWidth < 768) return;

  if (e.key === 'ArrowLeft') index--;
  else if (e.key === 'ArrowRight') index++;
  else return;

  index = Math.max(0, Math.min(index, filteredAlbums.length - 1));
  update();
});

/* =================================================
   모바일 스크롤 방향에 따라 헤더 숨기기/표시
================================================= */    
if (window.innerWidth < 768) {
  let lastScroll = 0;
  const headerWrap = document.querySelector('.header-wrap');

  window.addEventListener('scroll', () => {
    const currentScroll = window.pageYOffset;

    if (currentScroll <= 0) {
      headerWrap.classList.remove('hide'); // 최상단에서는 항상 표시
      return;
    }

    if (currentScroll > lastScroll) {
      // ↓ 스크롤: 헤더 숨김
      headerWrap.classList.add('hide');
    } else {
      // ↑ 스크롤: 헤더 표시
      headerWrap.classList.remove('hide');
    }

    lastScroll = currentScroll;
  });
}
    
/* =================================================
   랜덤 섞기 함수 (Fisher–Yates)
================================================= */   
function shuffleArray(array) {
  const arr = [...array]; // 원본 보존
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}    
    
    
/* ================================
   FULLSCREEN CONTROL (PC ONLY)  : 전체화면
================================ */
document.addEventListener('DOMContentLoaded', () => {

  const overlay = document.getElementById('fullscreenOverlay');
  const btn = document.getElementById('fullscreenBtn');

  function isMobile() {
    return window.innerWidth < 768;
  }

  function enterFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }

  function showOverlay() {
    if (isMobile()) return;
    overlay.style.display = 'flex';
  }

  function hideOverlay() {
    overlay.style.display = 'none';
  }

  // 버튼 클릭 → 전체화면
  btn.addEventListener('click', () => {
    enterFullscreen();
    hideOverlay();
  });

  // 전체화면 해제 감지
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      showOverlay();
    }
  });

  // 탭/앱 전환 후 복귀
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && !document.fullscreenElement) {
      showOverlay();
    }
  });

  // 최초 진입 (PC만)
  if (!isMobile()) {
    showOverlay();
  }

});

/* ================================
   앨범 평균색상 추출
================================ */    
function getAverageColor(img, callback) {
  try {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const size = 40;

    canvas.width = size;
    canvas.height = size;

    ctx.drawImage(img, 0, 0, size, size);
    const data = ctx.getImageData(0, 0, size, size).data;

    let r = 0, g = 0, b = 0;
    for (let i = 0; i < data.length; i += 4) {
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
    }

    const pixels = data.length / 4;
    callback(
      Math.round(r / pixels),
      Math.round(g / pixels),
      Math.round(b / pixels)
    );
  } catch (e) {
    console.warn('Color extract failed', e);
  }
}
    
/* ================================
   즐겨찾기
================================ */ 
function toggleFavorite(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));

  applyFilters(); // ⭐ 여기!
}

================================ */ 
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');

/* ===============================
   화면 새로고침 js
================================ */
if (window.navigator.standalone && window.innerWidth < 768) {

  let startY = 0;
  let pulling = false;
  const threshold = 80;

  const ptr = document.getElementById('ptr');
  const icon = ptr.querySelector('.ptr-icon');

  window.addEventListener('touchstart', e => {
    if (window.scrollY === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  window.addEventListener('touchmove', e => {
    if (!pulling) return;

    const y = e.touches[0].clientY;
    const diff = Math.max(0, y - startY);

    if (diff > 0) {
      e.preventDefault();

      const move = Math.min(diff, threshold);
      ptr.style.transform = `translateY(${move}px)`;

      icon.style.transform = diff > threshold
        ? 'rotate(180deg)'
        : 'rotate(0deg)';

      icon.style.opacity = Math.min(1, diff / threshold);
    }
  }, { passive: false });

  window.addEventListener('touchend', () => {
    if (!pulling) return;

    ptr.style.transform = 'translateY(0)';

    if (icon.style.opacity >= 1) {
      ptr.classList.add('loading');
      icon.textContent = '↻';

      setTimeout(() => {
        location.reload();
      }, 300);
    } else {
      icon.textContent = '↓';
    }

    pulling = false;
  });
}

/* =================================================
   ENTER KEY → 현재 중앙 앨범 링크 이동 (Cover Flow)
================================================= */
window.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (window.innerWidth < 768) return;      // PC만
  if (viewMode !== 'flow') return;           // Cover Flow만

  const album = filteredAlbums[index];
  if (!album) return;

  const url = getAppleMusicLink(album.appleMusic);

  if (window.navigator.standalone) {
    location.replace(url);   // iOS PWA
  } else {
    window.open(url, '_blank');
  }
});
